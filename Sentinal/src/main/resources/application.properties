spring.application.name=Sentinal
server.port=8080
transaction.service.url=http://localhost:8081

# DATABASE CONFIG
spring.datasource.url=jdbc:postgresql://localhost:5432/fraud_engine
spring.datasource.username=postgres
spring.datasource.password=prisar#1234

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# SECURITY CONFIG
spring.security.user.name=admin
spring.security.user.password=prisar#1234
logging.level.org.springframework.security=DEBUG
logging.level.org.springframework.web=DEBUG

# REDIS CONFIG
spring.data.redis.host=localhost
spring.data.redis.port=6379

# KAFKA CONFIG
spring.kafka.consumer.enable-auto-commit=true
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer

spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.consumer.group-id=fraud-group
spring.kafka.consumer.auto-offset-reset=earliest

spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer

spring.kafka.consumer.properties.spring.json.trusted.packages=*
spring.kafka.consumer.properties.spring.json.value.default.type=com.model.dto.TransactionCreatedEvent